<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRW CALC. 2026 | 韓國旅遊退稅計算機</title>
    <!-- 使用可靠的 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        
        :root {
            --ios-safe-area-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .italic-black { 
            font-style: italic; 
            font-weight: 900; 
        }

        /* 隱藏輸入框箭頭 */
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* 針對 GitHub Pages 部署後的移動端優化 */
        .sticky-bottom {
            padding-bottom: calc(1rem + var(--ios-safe-area-bottom));
        }

        /* 點擊回饋動畫 */
        .btn-active:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="bg-white text-zinc-900 transition-colors duration-300">
    <div class="max-w-md mx-auto p-5 md:p-10 min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center border-b border-zinc-100 pb-6">
            <div class="flex flex-col">
                <h1 class="text-2xl italic-black tracking-tighter leading-none">KRW CALC.</h1>
                <p class="text-[9px] tracking-[0.1em] text-zinc-400 font-bold uppercase mt-1 italic">Tax Assistant 2026</p>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] font-black text-zinc-400 uppercase tracking-widest leading-none mb-1 italic">Total Expenses</span>
                <div id="grand-total" class="text-3xl italic-black text-zinc-900 tracking-tighter leading-none">
                    NT$ 0
                </div>
            </div>
        </header>

        <!-- 匯率資訊 -->
        <div class="mb-8">
            <div class="bg-zinc-50 border border-zinc-200 rounded-2xl p-5 flex justify-between items-end shadow-sm">
                <div>
                    <span class="text-[9px] font-black text-zinc-400 uppercase tracking-widest block mb-1">Exchange Rate</span>
                    <div class="flex items-baseline gap-1">
                        <span id="rate-display" class="text-3xl font-black leading-none">0.0245</span>
                        <span class="text-[10px] font-bold text-zinc-400 uppercase italic">KRW/TWD</span>
                    </div>
                </div>
                <div class="text-right">
                    <button onclick="fetchRate()" class="text-[9px] font-black text-zinc-900 border border-zinc-900 px-3 py-1.5 rounded-md hover:bg-zinc-900 hover:text-white transition-all uppercase flex items-center gap-1 btn-active">
                        <i id="sync-icon" class="fa-solid fa-arrows-rotate"></i> Sync
                    </button>
                    <p id="sync-time" class="text-[8px] text-zinc-300 font-bold mt-1 uppercase leading-none italic">Initializing...</p>
                </div>
            </div>
        </div>

        <!-- 輸入區域 -->
        <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm mb-8">
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-black text-zinc-400 uppercase tracking-[0.2em] ml-1 mb-2 block italic">Item Name (Optional)</label>
                    <input type="text" id="item-name" placeholder="例如：藥妝、外套" 
                        class="w-full bg-zinc-50 border border-zinc-100 rounded-xl p-4 text-sm focus:bg-white focus:ring-1 focus:ring-black outline-none transition-all placeholder:text-zinc-300">
                </div>
                
                <div>
                    <label class="text-[9px] font-black text-zinc-400 uppercase tracking-[0.2em] ml-1 mb-2 block italic">Price (KRW)</label>
                    <div class="relative">
                        <input type="number" id="item-price" pattern="\d*" inputmode="numeric" placeholder="0" 
                            class="w-full bg-zinc-900 text-white rounded-2xl p-6 text-4xl font-black outline-none focus:ring-4 focus:ring-zinc-100 transition-all">
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-600 font-bold text-lg italic uppercase pointer-events-none">krw</div>
                    </div>
                    
                    <div id="refund-alert" class="hidden mt-3 items-center gap-1.5 text-red-500 text-[10px] font-black animate-pulse px-1 uppercase italic tracking-tighter">
                        <i class="fa-solid fa-circle-exclamation"></i> 符合退稅資格 (單筆已滿 30,000 ₩)
                    </div>
                </div>

                <!-- 即時預覽 -->
                <div id="preview-area" class="hidden px-1 space-y-3 pt-2">
                    <div class="flex justify-between items-center text-[10px] font-bold text-zinc-400 uppercase">
                        <span>預估原價 (含 1.5% 手續費)</span>
                        <span id="preview-original" class="font-mono">NT$ 0</span>
                    </div>
                    <div id="preview-refund-row" class="hidden flex justify-between items-center text-[10px] font-black text-zinc-900 uppercase italic">
                        <span class="flex items-center gap-1"><i class="fa-solid fa-receipt"></i> 2026 預估退稅額</span>
                        <span id="preview-refund" class="text-red-500 font-mono">- NT$ 0</span>
                    </div>
                    <div class="h-px bg-zinc-50 w-full"></div>
                    <div class="flex justify-between items-center">
                        <div class="text-zinc-400 text-[9px] font-black uppercase italic leading-none">最終實付 NT$</div>
                        <div id="preview-total" class="text-3xl italic-black text-zinc-900 leading-none tracking-tighter">0</div>
                    </div>
                </div>

                <button onclick="addItem()" class="w-full bg-zinc-900 text-white py-5 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-black active:scale-[0.98] transition-all shadow-lg btn-active">
                    <i class="fa-solid fa-plus"></i> ADD TO LIST
                </button>
            </div>
        </div>

        <!-- 清單 -->
        <div class="flex-grow pb-10 px-1">
            <div class="flex items-center justify-between mb-8 border-l-4 border-black pl-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-zinc-400 leading-none italic">Shopping History</h2>
                <span id="item-count" class="text-[9px] font-black text-zinc-300 uppercase italic tracking-widest">0 ITEMS</span>
            </div>
            <div id="history-list" class="space-y-6">
                <div class="text-center py-20 border-2 border-dashed border-zinc-100 rounded-[2rem]">
                    <p class="text-zinc-300 text-[10px] font-black uppercase tracking-[0.2em]">List is Empty</p>
                </div>
            </div>
        </div>

        <footer class="text-center py-6 border-t border-zinc-50">
            <p class="text-[8px] font-black text-zinc-200 uppercase tracking-[0.3em]">Built for Korea Travel 2026</p>
        </footer>
    </div>

    <script>
        let exchangeRate = 0.0245;
        let history = [];
        const FEE_RATE = 0.015;

        // 初始化匯率與本地存儲 (GitHub Pages 即使關閉瀏覽器也能保存資料)
        function init() {
            const savedHistory = localStorage.getItem('krw_history');
            if (savedHistory) {
                history = JSON.parse(savedHistory);
                updateUI();
            }
            fetchRate();
            document.getElementById('item-price').focus();
        }

        async function fetchRate() {
            const icon = document.getElementById('sync-icon');
            const timeEl = document.getElementById('sync-time');
            icon.classList.add('animate-spin');
            
            try {
                // 使用帶有緩存控制的 API
                const res = await fetch('https://open.er-api.com/v6/latest/KRW');
                const data = await res.json();
                if (data.rates && data.rates.TWD) {
                    exchangeRate = data.rates.TWD;
                    document.getElementById('rate-display').innerText = exchangeRate.toFixed(4);
                    timeEl.innerText = 'Updated: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            } catch (e) { 
                timeEl.innerText = 'Sync Error / Using Default'; 
            } finally { 
                icon.classList.remove('animate-spin'); 
            }
        }

        function getRefundKrw(krw) {
            if (krw < 30000) return 0;
            if (krw >= 250000) return 15500;
            if (krw >= 225000) return 13500;
            if (krw >= 200000) return 12250;
            if (krw >= 175000) return 10500;
            if (krw >= 150000) return 9250;
            if (krw >= 125000) return 8000;
            if (krw >= 100000) return 6500;
            if (krw >= 75000) return 5000;
            if (krw >= 50000) return 3250;
            if (krw >= 30000) return 1750;
            return 0;
        }

        // 輸入監聽
        document.getElementById('item-price').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            const preview = document.getElementById('preview-area');
            const alert = document.getElementById('refund-alert');
            
            if (val > 0) {
                preview.classList.remove('hidden');
                alert.classList.toggle('hidden', val < 30000);
                
                const refundKrw = getRefundKrw(val);
                const rawTwd = Math.round(val * exchangeRate);
                const feeTwd = Math.round(rawTwd * FEE_RATE);
                const originalTotal = rawTwd + feeTwd;
                const refundTwd = Math.round(refundKrw * exchangeRate);
                
                document.getElementById('preview-original').innerText = `NT$ ${originalTotal.toLocaleString()}`;
                document.getElementById('preview-refund').innerText = `- NT$ ${refundTwd.toLocaleString()}`;
                document.getElementById('preview-refund-row').classList.toggle('hidden', refundKrw === 0);
                document.getElementById('preview-total').innerText = (originalTotal - refundTwd).toLocaleString();
            } else {
                preview.classList.add('hidden');
                alert.classList.add('hidden');
            }
        });

        function addItem() {
            const priceEl = document.getElementById('item-price');
            const nameEl = document.getElementById('item-name');
            const priceVal = parseFloat(priceEl.value);
            const nameVal = nameEl.value.trim() || "未命名項目";
            
            if (!priceVal || priceVal <= 0) return;

            const refundKrw = getRefundKrw(priceVal);
            const rawTwd = Math.round(priceVal * exchangeRate);
            const feeTwd = Math.round(rawTwd * FEE_RATE);
            const originalTotal = rawTwd + feeTwd;
            const refundTwd = Math.round(refundKrw * exchangeRate);
            const finalTotal = originalTotal - refundTwd;

            const item = {
                id: Date.now(),
                name: nameVal,
                krw: priceVal,
                originalTotal,
                refundTwd,
                total: finalTotal,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            history.unshift(item);
            saveAndRefresh();
            
            // 重置輸入
            priceEl.value = '';
            nameEl.value = '';
            document.getElementById('preview-area').classList.add('hidden');
            document.getElementById('refund-alert').classList.add('hidden');
            priceEl.focus();
        }

        function removeItem(id) {
            history = history.filter(i => i.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('krw_history', JSON.stringify(history));
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('history-list');
            const grandTotal = document.getElementById('grand-total');
            const itemCount = document.getElementById('item-count');

            if (history.length === 0) {
                list.innerHTML = `<div class="text-center py-20 border-2 border-dashed border-zinc-100 rounded-[2rem]"><p class="text-zinc-300 text-[10px] font-black uppercase tracking-[0.2em]">List is Empty</p></div>`;
            } else {
                list.innerHTML = history.map(item => `
                    <div class="relative bg-white border-b-2 border-zinc-100 pb-6 flex flex-col group animate-in fade-in slide-in-from-bottom-2 duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex flex-col">
                                <h3 class="font-black text-zinc-900 text-xl uppercase italic tracking-tight leading-none mb-1">${item.name}</h3>
                                <span class="text-[9px] font-black text-zinc-300 uppercase tracking-widest">${item.time}</span>
                            </div>
                            <button onclick="removeItem(${item.id})" class="p-2 text-zinc-200 hover:text-black transition-colors btn-active">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-zinc-50 p-3 rounded-xl border border-zinc-100">
                                <span class="text-[9px] font-black text-zinc-400 uppercase block mb-1 leading-none">原換匯價 (含費)</span>
                                <span class="text-sm font-black text-zinc-500 font-mono italic tracking-tighter">NT$ ${item.originalTotal.toLocaleString()}</span>
                            </div>
                            <div class="bg-zinc-50 p-3 rounded-xl border border-zinc-100">
                                <span class="text-[9px] font-black text-red-400 uppercase block mb-1 leading-none tracking-tighter">預估退稅</span>
                                <span class="text-sm font-black text-red-500 font-mono italic tracking-tighter">- NT$ ${item.refundTwd.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end">
                            <div class="flex flex-col">
                                <span class="text-[9px] font-black text-zinc-300 uppercase tracking-widest leading-none mb-1">Original KRW</span>
                                <span class="text-xs font-bold text-zinc-400 leading-none font-mono">₩ ${item.krw.toLocaleString()}</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-[9px] font-black text-zinc-300 uppercase italic leading-none mb-1 tracking-widest">Subtotal</span>
                                <span class="text-2xl italic-black text-zinc-900 tracking-tighter leading-none">
                                    NT$ ${item.total.toLocaleString()}
                                </span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            const total = history.reduce((sum, item) => sum + item.total, 0);
            grandTotal.innerText = `NT$ ${total.toLocaleString()}`;
            itemCount.innerText = `${history.length} ITEMS`;
        }

        // 支持按下 Enter 鍵加入
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addItem();
            }
        });

        window.onload = init;
    </script>
</body>
</html>
