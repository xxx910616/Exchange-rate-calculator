<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Y U . Z Z Z ™ | TRAVEL CALC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        :root { --ios-safe-area-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .italic-black { font-style: italic; font-weight: 900; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .btn-active:active { transform: scale(0.96); }
        .animate-in { animation: fadeInSlide 0.4s ease-out forwards; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toggle-active { background-color: #18181b !important; color: white !important; }
    </style>
</head>
<body class="bg-white text-zinc-900 transition-colors duration-300">
    <div class="max-w-md mx-auto p-5 md:p-10 min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center border-b border-zinc-100 pb-6">
            <div class="flex flex-col">
                <h1 class="text-2xl italic-black tracking-tighter leading-none">Y U . Z Z Z ™</h1>
                <p class="text-[9px] tracking-[0.1em] text-zinc-400 font-bold uppercase mt-1 italic">2 0 2 6｜C A L C .</p>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] font-black text-zinc-400 uppercase tracking-widest leading-none mb-1 italic">Total Expenses</span>
                <div id="grand-total" class="text-3xl italic-black text-zinc-900 tracking-tighter leading-none">NT$ 0</div>
            </div>
        </header>

        <!-- 幣別切換與匯率 -->
        <div class="mb-8 space-y-3">
            <div class="flex bg-zinc-100 p-1 rounded-xl">
                <button id="btn-krw" onclick="setCurrency('KRW')" class="ccy-btn flex-1 py-2 text-[10px] font-black uppercase italic rounded-lg transition-all toggle-active">KRW 韓幣</button>
                <button id="btn-jpy" onclick="setCurrency('JPY')" class="ccy-btn flex-1 py-2 text-[10px] font-black uppercase italic rounded-lg transition-all text-zinc-400">JPY 日幣</button>
            </div>
            
            <div class="bg-zinc-50 border border-zinc-200 rounded-2xl p-5 flex justify-between items-end shadow-sm">
                <div>
                    <span class="text-[9px] font-black text-zinc-400 uppercase tracking-widest block mb-1">Exchange Rate</span>
                    <div class="flex items-baseline gap-1">
                        <span id="rate-display" class="text-3xl font-[900] leading-none">0.0245</span>
                        <span id="rate-label" class="text-[10px] font-bold text-zinc-400 uppercase italic">KRW/TWD</span>
                    </div>
                </div>
                <div class="text-right flex flex-col items-stretch min-w-[80px]">
                    <button onclick="fetchRate()" class="w-full text-[9px] font-black text-zinc-900 border border-zinc-900 px-3 py-1.5 rounded-md hover:bg-zinc-900 hover:text-white transition-all uppercase flex items-center justify-center gap-1 btn-active">
                        <i id="sync-icon" class="fa-solid fa-arrows-rotate"></i> Sync
                    </button>
                    <p id="sync-time" class="text-[8px] text-zinc-300 font-bold mt-1.5 uppercase leading-none italic text-center">Loading...</p>
                </div>
            </div>
        </div>

        <!-- 輸入區域 -->
        <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm mb-8">
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-black text-zinc-400 uppercase tracking-[0.2em] ml-1 mb-2 block italic">Item Name (Optional)</label>
                    <input type="text" id="item-name" placeholder="例如：藥妝、外套" 
                        class="w-full bg-zinc-50 border border-zinc-100 rounded-xl p-4 text-sm focus:bg-white focus:ring-1 focus:ring-black outline-none transition-all">
                </div>
                
                <div>
                    <label class="text-[9px] font-black text-zinc-400 uppercase tracking-[0.2em] ml-1 mb-2 block italic">Price (<span id="input-currency-label">KRW</span>)</label>
                    <div class="relative">
                        <input type="number" id="item-price" pattern="\d*" inputmode="numeric" placeholder="0" 
                            class="w-full bg-zinc-900 text-white rounded-2xl p-6 text-4xl font-black outline-none focus:ring-4 focus:ring-zinc-100 transition-all">
                        <div id="unit-tag" class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-600 font-bold text-lg italic uppercase pointer-events-none">krw</div>
                    </div>
                    <div id="refund-alert" class="hidden mt-3 items-center gap-1.5 text-red-500 text-[10px] font-black animate-pulse px-1 uppercase italic">
                        <i class="fa-solid fa-circle-exclamation"></i> 符合退稅門檻
                    </div>
                </div>

                <!-- 即時預覽 -->
                <div id="preview-area" class="hidden px-1 space-y-3 pt-2">
                    <div class="flex justify-between items-center text-[10px] font-bold text-zinc-400 uppercase">
                        <span>預估原價 (含 1.5% 手續費)</span>
                        <span id="preview-original" class="font-mono">NT$ 0</span>
                    </div>
                    <div id="preview-refund-row" class="hidden flex justify-between items-center text-[10px] font-black text-zinc-900 uppercase italic">
                        <span class="flex items-center gap-1"><i class="fa-solid fa-receipt"></i> 預估退稅</span>
                        <span id="preview-refund" class="text-red-500 font-mono">- NT$ 0</span>
                    </div>
                    <div class="h-px bg-zinc-50 w-full"></div>
                    <div class="flex justify-between items-center">
                        <div class="text-zinc-400 text-[9px] font-black uppercase italic font-bold">最終實付 NT$</div>
                        <div id="preview-total" class="text-3xl italic-black text-zinc-900 leading-none tracking-tighter">0</div>
                    </div>
                </div>

                <button onclick="addItem()" class="w-full bg-zinc-900 text-white py-5 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-black active:scale-[0.98] transition-all shadow-lg btn-active">
                    <i class="fa-solid fa-plus"></i> ADD TO LIST
                </button>
            </div>
        </div>

        <!-- 清單 -->
        <div class="flex-grow pb-10 px-1">
            <div class="flex items-center justify-between mb-8 border-l-4 border-black pl-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-zinc-400 leading-none italic">History</h2>
                <span id="item-count" class="text-[9px] font-black text-zinc-300 uppercase italic tracking-widest">0 ITEMS</span>
            </div>
            <div id="history-list" class="space-y-6"></div>
        </div>

        <footer class="text-center py-6 border-t border-zinc-50">
            <p class="text-[8px] font-black text-zinc-200 uppercase tracking-[0.3em]">Y U . Z Z Z ™</p>
        </footer>
    </div>

    <script>
        let currentCurrency = 'KRW';
        let rates = { KRW: 0.0245, JPY: 0.215 };
        let history = [];
        const FEE_RATE = 0.015;

        function init() {
            const saved = localStorage.getItem('multi_calc_history_v2');
            if (saved) { history = JSON.parse(saved); updateUI(); }
            fetchRate();
            document.getElementById('item-price').focus();
        }

        function setCurrency(ccy) {
            currentCurrency = ccy;
            document.querySelectorAll('.ccy-btn').forEach(btn => btn.classList.remove('toggle-active', 'text-zinc-400'));
            document.getElementById(`btn-${ccy.toLowerCase()}`).classList.add('toggle-active');
            
            document.getElementById('rate-label').innerText = `${ccy}/TWD`;
            document.getElementById('input-currency-label').innerText = ccy;
            document.getElementById('unit-tag').innerText = ccy.toLowerCase();
            document.getElementById('rate-display').innerText = rates[ccy].toFixed(4);
            
            document.getElementById('item-price').value = '';
            document.getElementById('preview-area').classList.add('hidden');
            document.getElementById('refund-alert').classList.add('hidden');
            
            fetchRate();
        }

        async function fetchRate() {
            const icon = document.getElementById('sync-icon');
            const timeEl = document.getElementById('sync-time');
            icon.classList.add('animate-spin');
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${currentCurrency}`);
                const data = await res.json();
                if (data.rates && data.rates.TWD) {
                    rates[currentCurrency] = data.rates.TWD;
                    document.getElementById('rate-display').innerText = rates[currentCurrency].toFixed(4);
                    timeEl.innerText = 'Updated: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            } catch (e) { timeEl.innerText = 'Sync Error'; }
            finally { icon.classList.remove('animate-spin'); }
        }

        function getRefundValue(val) {
            if (currentCurrency === 'KRW') {
                if (val < 30000) return 0;
                if (val >= 250000) return 15000; 
                if (val >= 225000) return 13000; 
                if (val >= 200000) return 12000; 
                if (val >= 175000) return 10000; 
                if (val >= 150000) return 9000;  
                if (val >= 125000) return 8000;
                if (val >= 100000) return 6000;  
                if (val >= 75000) return 5000;
                if (val >= 50000) return 3000;   
                if (val >= 30000) return 1500;
            } else if (currentCurrency === 'JPY') {
                if (val >= 5000) return val * 0.0845;
            }
            return 0;
        }

        document.getElementById('item-price').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            const preview = document.getElementById('preview-area');
            const alert = document.getElementById('refund-alert');
            const threshold = currentCurrency === 'KRW' ? 30000 : 5000;

            if (val > 0) {
                preview.classList.remove('hidden');
                alert.classList.toggle('hidden', val < threshold);
                const refundVal = getRefundValue(val);
                const rawTwd = Math.round(val * rates[currentCurrency]);
                const feeTwd = Math.round(rawTwd * FEE_RATE);
                const originalTotal = rawTwd + feeTwd;
                const refundTwd = Math.round(refundVal * rates[currentCurrency]);
                
                document.getElementById('preview-original').innerText = `NT$ ${originalTotal.toLocaleString()}`;
                document.getElementById('preview-refund').innerText = `- NT$ ${refundTwd.toLocaleString()}`;
                document.getElementById('preview-refund-row').classList.toggle('hidden', refundVal === 0);
                document.getElementById('preview-total').innerText = (originalTotal - refundTwd).toLocaleString();
            } else { preview.classList.add('hidden'); alert.classList.add('hidden'); }
        });

        function addItem() {
            const pEl = document.getElementById('item-price');
            const nEl = document.getElementById('item-name');
            const val = parseFloat(pEl.value);
            if (!val || val <= 0) return;
            
            const refundVal = getRefundValue(val);
            const rawTwd = Math.round(val * rates[currentCurrency]);
            const feeTwd = Math.round(rawTwd * FEE_RATE);
            const originalTotal = rawTwd + feeTwd;
            const refundTwd = Math.round(refundVal * rates[currentCurrency]);
            
            history.unshift({
                id: Date.now(), 
                name: nEl.value.trim() || "未命名項目",
                val: val, 
                ccy: currentCurrency,
                originalTotal, 
                refundTwd, 
                total: originalTotal - refundTwd,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem('multi_calc_history_v2', JSON.stringify(history));
            updateUI();
            pEl.value = ''; nEl.value = ''; pEl.focus();
            document.getElementById('preview-area').classList.add('hidden');
        }

        function removeItem(id) {
            history = history.filter(i => i.id !== id);
            localStorage.setItem('multi_calc_history_v2', JSON.stringify(history));
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = `<div class="text-center py-20 border-2 border-dashed border-zinc-100 rounded-[2rem] text-zinc-300 text-[10px] font-black uppercase tracking-widest">Empty List</div>`;
            } else {
                list.innerHTML = history.map(item => `
                    <div class="relative bg-white border-b-2 border-zinc-100 pb-6 flex flex-col animate-in">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-zinc-900 text-xl uppercase italic leading-none mb-1">${item.name}</h3>
                                <span class="text-[9px] font-black text-zinc-300 uppercase">${item.time} | ${item.ccy}</span>
                            </div>
                            <button onclick="removeItem(${item.id})" class="p-2 text-zinc-200 hover:text-black btn-active"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4 font-mono text-[10px]">
                            <div class="bg-zinc-50 p-3 rounded-xl border border-zinc-100">
                                <span class="text-zinc-400 block mb-1 font-black uppercase">原價+手續費</span>
                                <span class="font-black text-zinc-500">NT$ ${item.originalTotal.toLocaleString()}</span>
                            </div>
                            <div class="bg-zinc-50 p-3 rounded-xl border border-zinc-100">
                                <span class="text-red-400 block mb-1 font-black uppercase tracking-tighter">預估退稅</span>
                                <span class="font-black text-red-500">- NT$ ${item.refundTwd.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end">
                            <div class="text-xs font-bold text-zinc-400 font-mono">${item.ccy} ${item.val.toLocaleString()}</div>
                            <div class="text-2xl italic-black text-zinc-900 tracking-tighter">NT$ ${item.total.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            }
            const total = history.reduce((sum, i) => sum + i.total, 0);
            document.getElementById('grand-total').innerText = `NT$ ${total.toLocaleString()}`;
            document.getElementById('item-count').innerText = `${history.length} ITEMS`;
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(); });
        window.onload = init;
    </script>
</body>
</html>
